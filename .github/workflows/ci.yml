name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/wenji tests/wenji
          ruff format --check src/wenji tests/wenji

      - name: Run unit tests
        run: pytest -v

      - name: Run cleanup audit
        run: bash scripts/audit_release.sh

  integration:
    runs-on: ubuntu-latest
    # Single Python version for integration; download is the bottleneck.
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/wenji
          key: hf-bge-m3-v1
          restore-keys: |
            hf-bge-m3-

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration -v
