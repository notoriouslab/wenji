name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/wenji tests/wenji
          ruff format --check src/wenji tests/wenji

      - name: Run unit tests
        run: pytest -v

      - name: Run cleanup audit
        run: bash scripts/audit_release.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Validate metadata
        run: twine check dist/*

      # Asserted paths come from a local `python -m build` + `unzip -l`
      # inspection (release-v0-4-0 task 3.2). Guards against package-data
      # regressions — a wheel missing any of these is broken at runtime.
      - name: Assert wheel package-data completeness
        run: |
          listing=$(unzip -l dist/*.whl)
          missing=0
          for path in \
            "wenji/core/schema.sql" \
            "wenji/web/templates/base.html" \
            "wenji/examples/corpus_christian/entity_concepts.json" \
            "wenji/examples/corpus_christian/intent_keywords.json"; do
            if ! grep -q "$path" <<< "$listing"; then
              echo "::error::wheel is missing $path"
              missing=1
            fi
          done
          exit "$missing"

  integration:
    runs-on: ubuntu-latest
    # Single Python version for integration; download is the bottleneck.
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/wenji
          key: hf-bge-m3-v1
          restore-keys: |
            hf-bge-m3-

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration -v
